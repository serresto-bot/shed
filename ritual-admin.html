<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHED · Director</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

:root {
  --gold: #8B6535;
  --gold-dim: rgba(139,101,53,0.10);
  --gold-mid: rgba(139,101,53,0.22);
  --bg: #F7EEE5;
  --bg2: #EDE2D2;
  --text: #2C2016;
  --text-mid: #7A6040;
  --text-dim: #B09878;
  --line: rgba(139,101,53,0.16);
  --white: #FFFFFF;
  --font: 'Pretendard Variable', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --r: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; padding-bottom: 80px; }
.wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }

/* ── Header ── */
.site-header { border-bottom: 1px solid var(--line); background: rgba(247,238,229,0.94); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
.site-header .wrap { display: flex; align-items: center; justify-content: space-between; height: 54px; }
.logo { font-size: 0.9rem; font-weight: 900; letter-spacing: 0.1em; color: var(--gold); }
.director-tag { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); letter-spacing: 0.06em; }

/* ── Stats bar ── */
.stats-bar { background: var(--white); border-bottom: 1px solid var(--line); padding: 14px 0; }
.stats-inner { display: flex; }
.stat-chip { flex: 1; text-align: center; padding: 6px 8px; border-right: 1px solid var(--line); }
.stat-chip:last-child { border-right: none; }
.sc-val { display: block; font-size: 1.5rem; font-weight: 800; color: var(--gold); line-height: 1; margin-bottom: 3px; }
.sc-lbl { font-size: 0.68rem; color: var(--text-dim); font-weight: 600; letter-spacing: 0.03em; }

/* ── Tabs ── */
.tab-nav { display: flex; border-bottom: 2px solid var(--line); margin: 28px 0 0; }
.tab-btn { flex: 1; padding: 12px 8px; background: none; border: none; font-family: var(--font); font-size: 0.88rem; font-weight: 700; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-panel { padding: 24px 0; }
.tab-panel.hidden { display: none; }

/* ── Buttons ── */
.btn-primary { padding: 11px 22px; background: var(--gold); color: var(--bg); border: none; border-radius: 10px; font-family: var(--font); font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
.btn-primary:hover { opacity: 0.88; }
.btn-back { background: none; border: none; font-family: var(--font); font-size: 0.88rem; color: var(--text-mid); cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 6px; }
.btn-back:hover { color: var(--gold); }
.btn-copy { padding: 9px 16px; background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-mid); border-radius: 8px; font-family: var(--font); font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
.btn-copy:hover { background: var(--gold-mid); }
.btn-copy.copied { background: var(--gold); color: var(--bg); }

/* ── Participant list ── */
.p-list { display: flex; flex-direction: column; gap: 10px; }
.p-row { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 16px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
.p-row:hover { border-color: var(--gold-mid); box-shadow: 0 2px 12px rgba(139,101,53,0.08); }
.p-row-info { flex: 1; min-width: 0; }
.p-row-name { font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.p-row-meta { font-size: 0.78rem; color: var(--text-mid); }
.p-row-right { text-align: right; flex-shrink: 0; }
.p-row-days { font-size: 1.1rem; font-weight: 800; color: var(--gold); line-height: 1; }
.p-row-of { font-size: 0.68rem; color: var(--text-dim); font-weight: 600; }
.p-row-bar { width: 72px; height: 5px; background: var(--bg2); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.p-row-fill { height: 100%; background: var(--gold); border-radius: 3px; }
.badge { font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
.badge-ritual { background: var(--gold-dim); color: var(--gold); }
.badge-done   { background: var(--gold); color: var(--bg); }

/* ── Search ── */
.search-wrap { display: flex; gap: 10px; margin-bottom: 12px; }
.search-wrap input { flex: 1; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--white); font-family: var(--font); font-size: 0.95rem; color: var(--text); outline: none; transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--gold); }
.search-wrap input::placeholder { color: var(--text-dim); }
.search-hint { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 20px; }
.no-result { text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 0.88rem; line-height: 1.7; }
.loading { text-align: center; padding: 48px 0; color: var(--text-dim); font-size: 0.88rem; }

/* ── Link generator ── */
.link-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 24px; }
.form-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 140px; }
.form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); letter-spacing: 0.04em; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 11px 13px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg); font-family: var(--font); font-size: 0.92rem; color: var(--text); outline: none; transition: border-color 0.15s; }
.form-group input:focus, .form-group select:focus { border-color: var(--gold); background: var(--white); }
.link-result { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
.link-result-label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); letter-spacing: 0.04em; margin-bottom: 8px; }
.link-url-wrap { display: flex; gap: 8px; margin-bottom: 10px; }
.link-url-wrap input { flex: 1; padding: 10px 13px; border: 1.5px solid var(--gold-mid); border-radius: 10px; background: var(--gold-dim); font-family: monospace; font-size: 0.8rem; color: var(--text-mid); outline: none; }
.link-open { font-size: 0.82rem; color: var(--gold); font-weight: 600; text-decoration: none; display: inline-block; }
.link-open:hover { text-decoration: underline; }

/* ── Detail view ── */
#detailView { display: none; }
.detail-topbar { display: flex; align-items: center; gap: 12px; padding: 20px 0 4px; }
.p-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 22px 24px; margin-bottom: 14px; }
.p-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.p-name { font-size: 1.25rem; font-weight: 800; color: var(--text); }
.p-ritual-badge { font-size: 0.78rem; font-weight: 700; color: var(--gold); background: var(--gold-dim); padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
.p-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
.p-meta-item { font-size: 0.82rem; color: var(--text-mid); }
.p-meta-item strong { color: var(--text); font-weight: 700; }
.prog-bar-wrap { margin-bottom: 4px; }
.prog-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); font-weight: 600; margin-bottom: 6px; }
.prog-bar { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
.prog-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.8s ease; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.stat-box { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
.stat-val { font-size: 1.4rem; font-weight: 800; color: var(--gold); line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }
.chart-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 22px 24px; margin-bottom: 14px; }
.card-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 16px; }
#moodChart { width: 100%; height: 180px; display: block; }
.chart-legend { display: flex; gap: 20px; margin-top: 12px; font-size: 0.75rem; color: var(--text-mid); font-weight: 600; }
.leg-before::before { content:''; display:inline-block; width:18px; height:2px; background:rgba(139,101,53,0.4); border-radius:1px; margin-right:6px; vertical-align:middle; }
.leg-after::before  { content:''; display:inline-block; width:18px; height:2.5px; background:var(--gold); border-radius:1px; margin-right:6px; vertical-align:middle; }
.cal-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 22px 24px; margin-bottom: 14px; }
.stamp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.sg-cell { aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
.sg-done   { background: var(--gold); color: var(--bg); font-size: 1rem; }
.sg-miss   { background: var(--bg2); color: var(--text-dim); border: 2px dashed #C8A870; }
.sg-future { background: var(--bg2); color: var(--text-dim); opacity: 0.4; }
.sg-today  { background: var(--gold-dim); border: 2px solid var(--gold); color: var(--gold); }
.entries-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; margin-bottom: 14px; }
.entries-card .card-title { padding: 20px 24px 12px; }
.entry-row { border-top: 1px solid var(--line); cursor: pointer; transition: background 0.1s; }
.entry-row:hover { background: var(--bg); }
.entry-head { display: flex; align-items: center; gap: 12px; padding: 14px 22px; }
.entry-day { font-size: 0.7rem; font-weight: 800; color: var(--gold); background: var(--gold-dim); padding: 4px 9px; border-radius: 12px; min-width: 50px; text-align: center; flex-shrink: 0; }
.entry-ptitle { font-size: 0.88rem; font-weight: 700; color: var(--text); flex: 1; }
.entry-moods { font-size: 1rem; flex-shrink: 0; display: flex; align-items: center; gap: 3px; }
.mood-arrow { font-size: 0.62rem; color: var(--text-dim); }
.entry-date { font-size: 0.7rem; color: var(--text-dim); flex-shrink: 0; }
.entry-chevron { font-size: 0.72rem; color: var(--text-dim); flex-shrink: 0; transition: transform 0.2s; }
.entry-row.open .entry-chevron { transform: rotate(180deg); }
.entry-body { display: none; font-size: 0.875rem; color: var(--text-mid); line-height: 1.75; white-space: pre-wrap; word-break: break-word; border-left: 3px solid var(--gold-mid); margin: 0 22px 16px; padding-left: 14px; }
.entry-row.open .entry-body { display: block; }
.no-journal { color: var(--text-dim); font-style: italic; }
.result-link-row { display: flex; align-items: center; gap: 8px; padding: 12px 22px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--r); margin-bottom: 14px; font-size: 0.82rem; color: var(--text-mid); }
.result-link-row a { color: var(--gold); font-weight: 600; text-decoration: none; }
.result-link-row a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <span class="logo">SHED.</span>
    <span class="director-tag">DIRECTOR</span>
  </div>
</header>

<div class="stats-bar">
  <div class="wrap stats-inner">
    <div class="stat-chip"><span class="sc-val" id="totalCount">—</span><span class="sc-lbl">전체</span></div>
    <div class="stat-chip"><span class="sc-val" id="activeCount">—</span><span class="sc-lbl">진행중</span></div>
    <div class="stat-chip"><span class="sc-val" id="completeCount">—</span><span class="sc-lbl">완주</span></div>
    <div class="stat-chip"><span class="sc-val" id="avgDoneCount">—</span><span class="sc-lbl">평균 완료일</span></div>
  </div>
</div>

<div class="wrap">

  <div id="mainContent">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="list">참여자 목록</button>
      <button class="tab-btn" data-tab="search">검색</button>
      <button class="tab-btn" data-tab="link">링크 생성</button>
    </div>

    <!-- 목록 -->
    <div class="tab-panel" id="tab-list">
      <div id="listContent"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 검색 -->
    <div class="tab-panel hidden" id="tab-search">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="이름 또는 전화번호 일부" autocomplete="off">
        <button class="btn-primary" id="searchBtn">검색</button>
      </div>
      <p class="search-hint">일부만 입력해도 됩니다 — "이찬" 검색 시 이찬희, 이찬주 모두 표시</p>
      <div id="searchResults"></div>
    </div>

    <!-- 링크 생성 -->
    <div class="tab-panel hidden" id="tab-link">
      <div class="link-card">
        <div class="form-row">
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="linkName" placeholder="이찬희" autocomplete="off">
          </div>
          <div class="form-group">
            <label>전화번호 뒤 4자리</label>
            <input type="text" id="linkPhone" placeholder="6838" maxlength="4" inputmode="numeric" autocomplete="off">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>리추얼 코드</label>
            <select id="linkCode"></select>
          </div>
          <div class="form-group">
            <label>시작일</label>
            <input type="date" id="linkDate">
          </div>
        </div>
        <button class="btn-primary" id="linkGenBtn" style="width:100%;">링크 생성</button>
        <div id="linkOutput" style="display:none;">
          <div class="link-result">
            <p class="link-result-label">리추얼 링크</p>
            <div class="link-url-wrap">
              <input type="text" id="linkUrl" readonly>
              <button class="btn-copy" id="linkCopy">복사</button>
            </div>
            <a class="link-open" id="linkOpen" href="#" target="_blank">새 탭에서 열기 →</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail view -->
  <div id="detailView">
    <div class="detail-topbar">
      <button class="btn-back" id="detailClose">← 목록으로</button>
    </div>
    <div class="p-card">
      <div class="p-head">
        <div>
          <p class="p-name" id="rName"></p>
          <p style="font-size:0.8rem;color:var(--text-dim);margin-top:4px;" id="rSub"></p>
        </div>
        <span class="p-ritual-badge" id="rRitualName"></span>
      </div>
      <div class="p-meta">
        <div class="p-meta-item">시작일 <strong id="rStartDate"></strong></div>
        <div class="p-meta-item">진행 <strong id="rProgress"></strong></div>
        <div class="p-meta-item">코드 <strong id="rCode" style="color:var(--text-dim);font-size:0.78rem;"></strong></div>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-bar-label"><span>완료 현황</span><span id="rProgPct"></span></div>
        <div class="prog-bar"><div class="prog-bar-fill" id="rProgFill" style="width:0%"></div></div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">완료일수</div></div>
        <div class="stat-box"><div class="stat-val" id="statBefore">—</div><div class="stat-lbl">리추얼 전 평균</div></div>
        <div class="stat-box"><div class="stat-val" id="statAfter">—</div><div class="stat-lbl">리추얼 후 평균</div></div>
      </div>
    </div>
    <div class="chart-card">
      <p class="card-title">기분 변화 그래프</p>
      <canvas id="moodChart"></canvas>
      <div class="chart-legend">
        <span class="leg-before">리추얼 전</span>
        <span class="leg-after">리추얼 후</span>
      </div>
    </div>
    <div class="cal-card">
      <p class="card-title">14일 여정</p>
      <div class="stamp-grid" id="stampGrid"></div>
    </div>
    <div class="entries-card">
      <p class="card-title">일지 기록</p>
      <div id="entriesList"></div>
    </div>
    <div class="result-link-row" id="resultLinkRow" style="display:none;">
      <span>결과지</span>
      <a id="resultLinkA" href="#" target="_blank">열기 →</a>
    </div>
  </div>

</div>

<script src="ritual-data.js"></script>
<script>
const APPS_URL   = '/api/sheets-proxy';
const MOOD_EMOJI = { 1:'😔', 2:'😕', 3:'😐', 4:'🙂', 5:'😊' };

let allParticipants = [];

// ── Adapters ──────────────────────────────────────────────────────────────────
function adaptParticipant(p) {
  return {
    pid:       String(p.pid        || ''),
    name:      String(p.name       || ''),
    phone:     String(p.phone4     || p.phone || ''),
    code:      String(p.ritualCode || p.code  || ''),
    startDate: String(p.startDate  || ''),
    link:      String(p.link       || ''),
    daysDone:  +(p.daysCompleted   || p.daysDone || 0),
  };
}

function adaptRecords(arr) {
  if (!Array.isArray(arr)) return {};
  const out = {};
  arr.forEach(r => {
    const day = String(r.day || '');
    if (!day) return;
    out[day] = {
      moodBefore:  +(r.moodBefore  || 0) || null,
      moodAfter:   +(r.moodAfter   || 0) || null,
      journal:      r.journal      || '',
      completedAt:  r.completedAt  || '',
    };
  });
  return out;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(list) {
  const total    = list.length;
  const complete = list.filter(p => p.daysDone >= 14).length;
  const active   = list.filter(p => p.daysDone > 0 && p.daysDone < 14).length;
  const avg      = total ? (list.reduce((s, p) => s + p.daysDone, 0) / total).toFixed(1) : '—';
  document.getElementById('totalCount').textContent    = total;
  document.getElementById('activeCount').textContent   = active;
  document.getElementById('completeCount').textContent = complete;
  document.getElementById('avgDoneCount').textContent  = avg;
}

// ── Row renderer ──────────────────────────────────────────────────────────────
function makeParticipantRow(p) {
  const ritual = RITUAL_DATA[p.code];
  const pct    = Math.round(p.daysDone / 14 * 100);
  const isDone = p.daysDone >= 14;

  const row = document.createElement('div');
  row.className = 'p-row';
  row.innerHTML = `
    <div class="p-row-info">
      <div class="p-row-name">
        ${p.name}
        ${isDone
          ? '<span class="badge badge-done">완주 ✦</span>'
          : `<span class="badge badge-ritual">${p.code}</span>`}
      </div>
      <div class="p-row-meta">${ritual ? ritual.name : p.code}  ·  시작일 ${p.startDate || '—'}</div>
    </div>
    <div class="p-row-right">
      <div class="p-row-days">${p.daysDone}</div>
      <div class="p-row-of">/ 14일</div>
      <div class="p-row-bar"><div class="p-row-fill" style="width:${pct}%"></div></div>
    </div>
  `;
  row.addEventListener('click', () => openDetail(p.pid));
  return row;
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList(list) {
  const el = document.getElementById('listContent');
  if (!list.length) { el.innerHTML = '<div class="no-result">참여자가 없어요.</div>'; return; }
  const sorted = [...list].sort((a, b) => b.daysDone - a.daysDone || a.name.localeCompare(b.name));
  el.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'p-list';
  sorted.forEach(p => wrap.appendChild(makeParticipantRow(p)));
  el.appendChild(wrap);
}

async function refreshList() {
  try {
    const res  = await fetch(`${APPS_URL}?action=list`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    allParticipants = (data.list || []).map(adaptParticipant);
  } catch(e) {
    allParticipants = [];
    document.getElementById('listContent').innerHTML =
      '<div class="no-result">목록을 불러오지 못했어요.<br>' + e.message + '</div>';
    return;
  }
  renderStats(allParticipants);
  renderList(allParticipants);
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q  = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('searchResults');
  if (!q) return;

  el.innerHTML = '<div class="loading">검색 중...</div>';

  try {
    const isPhone = /^\d+$/.test(q);
    const params  = new URLSearchParams({ action: 'search' });
    if (isPhone) params.set('phone', q);
    else         params.set('name', q);

    const res  = await fetch(`${APPS_URL}?${params}`);
    const data = await res.json();

    if (!data.ok || !data.results || !data.results.length) {
      el.innerHTML = '<div class="no-result">검색 결과가 없어요.</div>';
      return;
    }

    const list = data.results.map(adaptParticipant);
    el.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'p-list';
    list.forEach(p => wrap.appendChild(makeParticipantRow(p)));
    el.appendChild(wrap);
  } catch(e) {
    el.innerHTML = '<div class="no-result">검색 중 오류가 발생했어요.</div>';
  }
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function openDetail(pid) {
  showDetailView();
  document.getElementById('rName').textContent    = '불러오는 중...';
  document.getElementById('rProgFill').style.width = '0%';
  document.getElementById('stampGrid').innerHTML   = '';
  document.getElementById('entriesList').innerHTML = '';

  try {
    const res  = await fetch(`${APPS_URL}?action=detail&pid=${encodeURIComponent(pid)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const p       = adaptParticipant(data.participant);
    const records = adaptRecords(data.records);
    renderDetail(p, records);
  } catch(e) {
    document.getElementById('rName').textContent = '불러오기 실패';
  }
}

function showDetailView() {
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('detailView').style.display  = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailView').style.display  = 'none';
  document.getElementById('mainContent').style.display = 'block';
});

function renderDetail(p, records) {
  const ritual = RITUAL_DATA[p.code];
  if (!ritual) return;

  const days = Object.keys(records).map(Number).sort((a,b)=>a-b);
  const done = days.length;
  const pct  = Math.round(done / 14 * 100);

  document.getElementById('rName').textContent       = p.name;
  document.getElementById('rSub').textContent        = `전화 ···${p.phone}`;
  document.getElementById('rRitualName').textContent  = ritual.name;
  document.getElementById('rStartDate').textContent   = p.startDate || '—';
  document.getElementById('rProgress').textContent    = `${done} / 14일`;
  document.getElementById('rCode').textContent        = p.code;
  document.getElementById('rProgPct').textContent     = pct + '%';
  document.getElementById('rProgFill').style.width   = pct + '%';
  document.getElementById('statDone').textContent     = done;

  const befVals = days.map(d => records[d].moodBefore).filter(Boolean);
  const aftVals = days.map(d => records[d].moodAfter).filter(Boolean);
  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '—';
  document.getElementById('statBefore').textContent = avg(befVals);
  document.getElementById('statAfter').textContent  = avg(aftVals);

  drawChart(records);
  renderStamps(records, p.startDate);
  renderEntries(records, ritual);

  const linkRow = document.getElementById('resultLinkRow');
  if (p.link) { linkRow.style.display='flex'; document.getElementById('resultLinkA').href=p.link; }
  else         { linkRow.style.display='none'; }
}

// ── Mood chart ────────────────────────────────────────────────────────────────
function drawChart(records) {
  const canvas = document.getElementById('moodChart');
  const W = canvas.parentElement.clientWidth - 48, H = 180;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const PAD = { top:16, right:16, bottom:28, left:28 };
  const cW = W-PAD.left-PAD.right, cH = H-PAD.top-PAD.bottom;
  ctx.clearRect(0,0,W,H);
  ctx.textAlign='right'; ctx.font='10px sans-serif';
  for (let y=1;y<=5;y++) {
    const yp = PAD.top + cH*(5-y)/4;
    ctx.fillStyle='rgba(139,101,53,0.45)'; ctx.fillText(y, PAD.left-6, yp+4);
    ctx.strokeStyle='rgba(139,101,53,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.left,yp); ctx.lineTo(PAD.left+cW,yp); ctx.stroke();
  }
  ctx.textAlign='center'; ctx.fillStyle='rgba(139,101,53,0.45)';
  [1,4,7,10,14].forEach(d => ctx.fillText(d, PAD.left+(d-1)*cW/13, H-PAD.bottom+14));
  const getX = d => PAD.left+(d-1)*cW/13;
  const getY = v => PAD.top+cH*(5-v)/4;
  const days = Object.keys(records).map(Number).sort((a,b)=>a-b);
  if (!days.length) return;
  const bef = days.filter(d=>records[d].moodBefore);
  if (bef.length>=2) {
    ctx.strokeStyle='rgba(139,101,53,0.35)'; ctx.lineWidth=2; ctx.setLineDash([5,4]); ctx.lineJoin='round';
    ctx.beginPath(); bef.forEach((d,i)=>{const x=getX(d),y=getY(records[d].moodBefore);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke(); ctx.setLineDash([]);
    bef.forEach(d=>{ctx.fillStyle='rgba(139,101,53,0.35)';ctx.beginPath();ctx.arc(getX(d),getY(records[d].moodBefore),3.5,0,Math.PI*2);ctx.fill();});
  }
  const aft = days.filter(d=>records[d].moodAfter);
  if (aft.length>=2) {
    ctx.strokeStyle='#8B6535'; ctx.lineWidth=2.5; ctx.lineJoin='round';
    ctx.beginPath(); aft.forEach((d,i)=>{const x=getX(d),y=getY(records[d].moodAfter);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}); ctx.stroke();
    aft.forEach(d=>{
      ctx.fillStyle='#8B6535';ctx.beginPath();ctx.arc(getX(d),getY(records[d].moodAfter),4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#F7EEE5';ctx.beginPath();ctx.arc(getX(d),getY(records[d].moodAfter),2,0,Math.PI*2);ctx.fill();
    });
  }
}

// ── Stamps ────────────────────────────────────────────────────────────────────
function renderStamps(records, startDate) {
  const grid = document.getElementById('stampGrid');
  grid.innerHTML = '';
  const sd = new Date(startDate); sd.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const cur = Math.min(Math.max(Math.floor((today-sd)/86400000)+1,1),14);
  for (let d=1;d<=14;d++) {
    const cell = document.createElement('div'); cell.className='sg-cell';
    if      (records[d]) { cell.classList.add('sg-done');   cell.textContent='✦'; }
    else if (d===cur)    { cell.classList.add('sg-today');  cell.textContent=d; }
    else if (d<cur)      { cell.classList.add('sg-miss');   cell.textContent=d; }
    else                 { cell.classList.add('sg-future'); cell.textContent=d; }
    grid.appendChild(cell);
  }
}

// ── Entries ───────────────────────────────────────────────────────────────────
function renderEntries(records, ritual) {
  const list = document.getElementById('entriesList');
  list.innerHTML = '';
  const days = Object.keys(records).map(Number).sort((a,b)=>a-b);
  if (!days.length) { list.innerHTML='<p style="padding:20px 22px;color:var(--text-dim);font-size:0.88rem;">아직 기록된 일지가 없어요.</p>'; return; }
  days.forEach(d => {
    const rec    = records[d];
    const prompt = ritual.prompts[d-1];
    const date   = rec.completedAt ? new Date(rec.completedAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}) : '';
    const row    = document.createElement('div'); row.className='entry-row';
    row.innerHTML = `
      <div class="entry-head">
        <span class="entry-day">DAY ${d}</span>
        <span class="entry-ptitle">${prompt?(prompt.title||prompt.prompt.slice(0,22)+'…'):''}</span>
        <span class="entry-moods">${MOOD_EMOJI[rec.moodBefore]||'—'}<span class="mood-arrow">→</span>${MOOD_EMOJI[rec.moodAfter]||'—'}</span>
        <span class="entry-date">${date}</span>
        <span class="entry-chevron">▾</span>
      </div>
      <div class="entry-body${rec.journal?'':' no-journal'}">${rec.journal||'작성된 내용이 없어요.'}</div>
    `;
    row.querySelector('.entry-head').addEventListener('click', ()=>row.classList.toggle('open'));
    list.appendChild(row);
  });
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.remove('hidden');
  });
});

// ── Link generator ────────────────────────────────────────────────────────────
(function initLinkGen() {
  const sel = document.getElementById('linkCode');
  Object.keys(RITUAL_DATA).sort().forEach(code => {
    const opt = document.createElement('option');
    opt.value = code; opt.textContent = `${code} — ${RITUAL_DATA[code].name}`;
    sel.appendChild(opt);
  });
  const today = new Date();
  document.getElementById('linkDate').value =
    `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  document.getElementById('linkGenBtn').addEventListener('click', () => {
    const name  = document.getElementById('linkName').value.trim();
    const phone = document.getElementById('linkPhone').value.trim();
    const code  = document.getElementById('linkCode').value;
    const date  = document.getElementById('linkDate').value.replace(/-/g,'');
    if (!name || !phone || !code) { alert('이름, 전화번호, 리추얼 코드를 모두 입력해주세요.'); return; }
    const pid = name.replace(/\s/g,'') + phone;
    const url = `https://shedevent.vercel.app/ritual.html?p=${encodeURIComponent(pid)}&n=${encodeURIComponent(name)}&r=${code}&d=${date}&ph=${phone}`;
    document.getElementById('linkUrl').value = url;
    document.getElementById('linkOpen').href = url;
    document.getElementById('linkOutput').style.display = 'block';
  });

  document.getElementById('linkCopy').addEventListener('click', function() {
    navigator.clipboard.writeText(document.getElementById('linkUrl').value).then(() => {
      this.textContent='복사됨 ✓'; this.classList.add('copied');
      setTimeout(() => { this.textContent='복사'; this.classList.remove('copied'); }, 2000);
    });
  });
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
refreshList();
